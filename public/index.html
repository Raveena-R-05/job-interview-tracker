<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Job Interview Tracker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>📋 Job Interview Tracker</h1>
      <p>Manage your candidate interviews efficiently</p>
      <nav class="nav-links">
        <a href="index.html" class="active">Candidates</a>
        <a href="jobs.html">Jobs</a>
      </nav>
    </header>

    <div class="card">
      <h2>Add New Candidate</h2>
      <form id="candidateForm">
        <div class="form-group">
          <label for="name">Full Name</label>
          <input type="text" id="name" placeholder="Enter candidate name" required>
        </div>

        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" placeholder="candidate@example.com" required>
        </div>

        <div class="form-group">
          <label for="phone">Phone Number</label>
          <input type="text" id="phone" placeholder="+1 (555) 000-0000" required>
        </div>

        <div class="form-group">
          <label for="position">Position</label>
          <input type="text" id="position" placeholder="e.g., Software Engineer" required>
        </div>

        <div class="form-group">
          <label for="status">Interview Status</label>
          <select id="status" required>
            <option value="Scheduled">Scheduled</option>
            <option value="Completed">Completed</option>
            <option value="Cancelled">Cancelled</option>
          </select>
        </div>

        <button type="submit" class="btn-submit">Add Candidate</button>
      </form>
    </div>

    <div class="card">
      <h2>Candidate List</h2>
      <div class="table-container">
        <table id="candidateTable">
          <thead>
            <tr>
              <th>Name</th>
              <th>Email</th>
              <th>Phone</th>
              <th>Position</th>
              <th>Status</th>
              <th>Update</th>
              <th>Delete</th>
            </tr>
          </thead>
          <tbody id="candidateTableBody">
            <!-- Candidates will be loaded here -->
          </tbody>
        </table>
        <div id="emptyState" class="empty-state">
          <p>No candidates yet. Add your first candidate above!</p>
        </div>
      </div>
      
      <div class="pagination" id="pagination">
        <button id="prevBtn" class="pagination-btn" disabled>← Previous</button>
        <span class="page-info" id="pageInfo">Page 1 of 1</span>
        <button id="nextBtn" class="pagination-btn" disabled>Next →</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
